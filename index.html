<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Territorial Cyber Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Stile Cyberpunk / Monitor Operativo */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0a0f1d;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #0d1527;
            padding: 15px 20px;
            border-bottom: 2px solid #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
            height: 60px;
            box-sizing: border-box;
            z-index: 1000;
        }
        h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            margin: 3px 0 0 0;
            color: #8ab4f8;
            font-size: 11px;
        }
        
        #map {
            width: 100%;
            height: calc(100vh - 60px); 
            background-color: #0a0f1d;
        }

        /* TRUCCO CSS: Trasforma la mappa standard di OpenStreetMap in Dark Mode Cyberpunk */
        .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) saturate(60%) brightness(90%) contrast(90%);
        }

        /* Personalizzazione Popup Mappa */
        .leaflet-popup-content-wrapper {
            background: #0d1527 !important;
            color: #ffffff !important;
            border: 1px solid #ff3366 !important;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
        }
        .leaflet-popup-tip {
            background: #0d1527 !important;
            border: 1px solid #ff3366 !important;
        }
        .popup-title {
            color: #ff3366;
            font-weight: bold;
            border-bottom: 1px solid #ff3366;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .popup-meta {
            font-size: 11px;
            color: #8ab4f8;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🛡️ SENTINEL // O.S.I.A.T.</h1>
        <div class="subtitle">Open-Source Intelligence & Territorial Awareness — Node: Campobasso (Molise)</div>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inizializza la mappa centrata su Campobasso
        const map = L.map('map', {
            center: [41.5610, 14.6628],
            zoom: 14,
            zoomControl: true
        });

        // 2. Carica i server ufficiali mondiali di OpenStreetMap (Zero blocchi di sicurezza)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // 3. Array dei dati storici estratti dal tuo database di Campobasso
        const incidenti = [
            {
                id: "MOL-CYBER-001",
                target: "Regione Molise / ASREM",
                periodo: "Dicembre 2023",
                info: "Attacco ransomware LockBit al fornitore Westpole. Suite URBI paralizzata, blocco totale dei servizi contabili e sanitari.",
                coords: [41.5574, 14.6715]
            },
            {
                id: "MOL-CYBER-002",
                target: "Università del Molise (UNIMOL)",
                periodo: "Novembre 2025",
                info: "Compromissione account email istituzionali. Utilizzo delle caselle per campagne massive di phishing mirate al furto di tasse universitarie.",
                coords: [41.5542, 14.6582]
            },
            {
                id: "MOL-CYBER-003",
                target: "Fascicolo Sanitario Elettronico",
                periodo: "Gennaio 2025",
                info: "Data breach strutturale dovuto a vulnerabilità software (URL manipulation). Accesso abusivo ai referti medici. Sanzione del Garante Privacy.",
                coords: [41.5650, 14.6690]
            },
            {
                id: "MOL-CYBER-004",
                target: "Siti Web Istituzionali",
                periodo: "Febbraio 2025",
                info: "Attacco DDoS di massa sferrato da collettivi hacker filorussi. Portali della Regione mandati temporaneamente offline.",
                coords: [41.5595, 14.6650]
            },
            {
                id: "MOL-CYBER-005",
                target: "Comune di Campobasso",
                periodo: "Dicembre 2022",
                info: "Incursione cyber alle infrastrutture di Palazzo San Giorgio. Blocco dei sistemi elettronici di pagamento PagoPA. Intervento della Polizia Postale.",
                coords: [41.5611, 14.6631]
            }
        ];

        // 4. Ciclo per posizionare i cerchi radar rossi
        incidenti.forEach(incidente => {
            const marker = L.circleMarker(incidente.coords, {
                color: '#ff3366',
                fillColor: '#ff3366',
                fillOpacity: 0.6,
                radius: 9,
                weight: 2
            }).addTo(map);

            const popupContent = `
                <div class="popup-title">[${incidente.id}] ANOMALIA ICT</div>
                <div class="popup-meta"><b>Target:</b> ${incidente.target}<br><b>Periodo:</b> ${incidente.periodo}</div>
                <div style="font-size:12px; line-height:1.4; font-family: monospace;">${incidente.info}</div>
            `;

            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
